name: collect-data

# Daily data collection (Mon-Fri). Fetches every series and commits the raw files;
# each commit is a point-in-time snapshot, so git history is the real-time vintage db.
on:
  schedule:
    - cron: "0 6 * * 1-5"      # 06:00 UTC (08:00 CET) Mon-Fri
  workflow_dispatch: {}         # allow manual runs

permissions:
  contents: write

concurrency:
  group: repo-writer            # never overlap with the Friday nowcast push
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Fetch all series
        run: |
          python src/fetch_data.py --refresh
          python src/fetch_new_data.py
      - name: Commit raw data if changed
        run: |
          git config user.name "danielvykoukal"
          git config user.email "daniel.vykoukal@cerge-ei.cz"
          git add data/raw
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "data: collect $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push origin main
          fi
